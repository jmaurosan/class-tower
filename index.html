<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0f756f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <title>Class Tower - Dashboard</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet">
    
    <!-- OneSignal Push Notifications -->
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    // Só inicializa se não for localhost para evitar erro de domínio que trava o app
    if (window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1') {
        OneSignalDeferred.push(async function(OneSignal) {
            try {
                await OneSignal.init({
                    appId: "87c78823-809c-47df-ac07-092c693d76b5",
                    safari_web_id: "",
                    notifyButton: {
                        enable: true,
                    },
                });
            } catch (err) {
                console.warn('OneSignal failed to initialize:', err);
            }
        });
    }

    // AUTO-RECOVERY: Se o app ficar travado na tela de carregamento por mais de 20 segundos
    setTimeout(() => {
        const root = document.getElementById('root');
        if (root && root.innerHTML.includes('Verificando acesso')) {
            console.warn('🚀 [AUTO-RECOVERY] O login parece estar travado. Limpando cache e tentando novamente...');
            localStorage.clear();
            sessionStorage.clear();
            // Só faz o reload se realmente estiver na tela de loading travada
            window.location.reload();
        }
    }, 20000);
    </script>

    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0f756f",
                        "background-light": "#ffffff",
                        "background-dark": "#1d222a",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    }
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        body {
            font-family: 'Manrope', sans-serif;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }
    </style>
</head>

<body class="bg-[#fbfcfc] dark:bg-[#15191e] antialiased text-[#111717]">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
</body>

</html>
